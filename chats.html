<!DOCTYPE html>
<html lang="en">
<head>
 <script>(function(w,d,s,l,i){w[l]=w[l]||[];w[l].push({'gtm.start':

    j=d.createElement(s),dl=l!='dataLayer'?'&l='+l:'';j.async=true;j.src=
    'https://www.googletagmanager.com/gtm.js?id='+i+dl;f.parentNode.insertBefore(j,f);

    <meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Accmarket Messages</title>
    <link rel="stylesheet" href="assets/css/chats.css">

<script type="module" src="assets/js/chats.js?v=1.1"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <script src="https://unpkg.com/@phosphor-icons/web"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800&display=swap" rel="stylesheet">

</head>
<body>
<noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-M9WLK8GG"
    height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>
    <div class="app-container">
        <aside class="sidebar">
            <header class="sidebar-header">
                <h2>Messages</h2>
                <button class="icon-btn"><i class="ph ph-note-pencil"></i></button>
            </header>
            <div class="search-bar">
                <i class="ph ph-magnifying-glass"></i>
                <input type="text" id="chatSearch" placeholder="Search chats...">
            </div>
            <div class="chat-list"></div>
        </aside>

        <main class="chat-window">
            <header class="chat-header">
                <div class="user-details">
                    <button class="icon-btn back-btn" id="backToList"><i class="ph ph-caret-left"></i></button>
                    <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Felix" id="headerAvatar" alt="User">
                    <div>
                        <h3 id="headerName">Select a Chat</h3>
                        <p class="status" id="headerStatus">Online</p>
                    </div>
                </div>
<div class="header-actions">
    <button class="icon-btn" id="menuBtn" onclick="toggleStatusMenu(event)">
        <i class="ph ph-dots-three-vertical"></i>
    </button>
    
    <div id="statusMenu" class="dropdown-menu">
        

        <div id="btnConfirmDelivery" class="menu-item" style="display: none;" onclick="upgradeToStepTwo()">
            <i class="ph ph-package"></i> Confirm Delivery
        </div>

        <div id="btnReleaseFunds" class="menu-item" style="display: none;" onclick="upgradeToStepThree()">
            <i class="ph ph-hand-coins"></i> Release Funds
        </div>

        <div id="btnDispute" class="menu-item item-danger" onclick="handleDispute()">
            <i class="ph ph-warning-circle"></i> Dispute
        </div>

<div id="btnCancel" class="menu-item item-danger" onclick="handleCancelDeal()">
            <i class="ph ph-x-circle"></i> Cancel Deal
        </div>
    </div>
</div>


 
            </header>

            <div class="product-context-bar">
                <img src="https://api.dicebear.com/7.x/shapes/svg?seed=Apex" id="productImg" alt="Item">
                <div class="product-details">
                    <span class="product-name" id="productTitle">Product Name</span>
                    <span class="product-price" id="productPrice">₦0.00</span>
                </div>
                <button class="view-listing-btn">View Listing</button>
            </div>

            <div class="escrow-status-bar">
                <div class="status-step completed"><i class="ph ph-wallet"></i><span>Paid</span></div>
                <div class="status-line active"></div>
                <div class="status-step active" id="stepDelivery"><i class="ph ph-key"></i><span>Delivery</span></div>
                <div class="status-line" id="lineRelease"></div>
                <div class="status-step" id="stepRelease"><i class="ph ph-check-circle"></i><span>Release</span></div>
            </div>

            <section class="message-container"></section>

            <div class="escrow-actions-area"></div>

 <div class="chat-footer">
    <footer class="chat-input-area">
        <input type="file" id="fileInput" accept="image/*" style="display: none;">
        
        <button class="icon-btn" id="attachBtn"><i class="ph ph-paperclip"></i></button>
        
        <div class="input-wrapper">
            <input type="text" id="messageInput" placeholder="Type a message...">
            <button class="icon-btn"><i class="ph ph-smiley"></i></button>
        </div>
        <button class="send-btn" id="sendMessageBtn"><i class="ph ph-paper-plane-right"></i></button>
    </footer>
</div>


        </main>
    </div>

    <div class="modal-overlay" id="disputeModal">
        <div class="modal-card">
            <div class="modal-header">
                <h3><i class="ph ph-warning-octagon"></i> Raise a Dispute</h3>
                <button class="close-modal" id="closeDispute">&times;</button>
            </div>
            <div class="modal-body">
                <p>Funds will be frozen. A moderator will join this chat.</p>
                <label>Reason</label>
 <select id="disputeReason">
    <option value="no_delivery">Seller hasn't sent details</option>
    <option value="wrong_acc">Account is not as described</option>
    <option value="recovered">Account was recovered</option>
    <option value="invalid_login">Login details are not working</option>
    <option value="email_not_changed">Email cannot be changed</option>
    <option value="missing_items">Items/skins/levels promised are missing</option>
    <option value="account_banned">Account is banned or restricted</option>
    <option value="seller_not_responding">Seller stopped responding</option>
    <option value="partial_delivery">Seller only delivered part of the deal</option>
    <option value="security_issue">Account still linked to seller (phone/email)</option>
    <option value="fake_account">Account appears fake or stolen</option>
</select>
                <textarea id="disputeDetails" placeholder="Explain what happened..."></textarea>
            </div>
            <div class="modal-footer">
                <button class="btn-secondary" id="cancelDispute">Cancel</button>
                <button class="btn-danger" id="submitDispute">Raise dispute</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="ratingModal">
    <div class="rating-modal-card">
        <div class="rating-modal-header">
            <h3>Rate Transaction</h3>
            <button class="close-rating" id="closeRating">&times;</button>
        </div>
        <div class="rating-modal-body">
            <div class="percent-circle">
                <span id="percentValue">100</span>%
            </div>
            <p id="percentLabel">Excellent</p>
            <input type="range" min="0" max="100" value="100" class="percent-slider" id="ratingSlider">
            <textarea id="ratingComment" placeholder="Write a review (optional)..."></textarea>
        </div>
        <div class="rating-modal-footer">
            <button class="btn-rating-submit" id="submitRating">Submit Feedback</button>
        </div>
    </div>
</div>





</body>
<script>
function setAppContainerHeight() {
    const app = document.querySelector('.app-container');
    if (!app) return;
    
    // Use the actual visible height in Chrome/Android
    const vh = window.innerHeight;
    app.style.height = `${vh}px`;
}

// Initial load
window.addEventListener('load', setAppContainerHeight);

// On resize (keyboard, rotation, nav bar changes)
window.addEventListener('resize', setAppContainerHeight);

// Optional: on orientation change
window.addEventListener('orientationchange', setAppContainerHeight);
</script>
</html>
